name: Task
description: 設計・実装・ドキュメント更新などの通常作業
title: "[Task]: "
labels:
  - task
body:
  - type: markdown
    attributes:
      value: |
        ## Task Issue
        通常作業用のIssue。
        進捗・優先度・日付・EstimateはProjectsで管理する。
        Issue本文には、目的・背景・作業範囲・完了条件を記載する。

  - type: input
    id: parent_issue
    attributes:
      label: 親Issue
      description: 紐づくEpicまたは親Issue番号を書く
      placeholder: "#12"
    validations:
      required: true

  - type: dropdown
    id: work_type
    attributes:
      label: 作業種別
      description: 作業内容の分類を選択する
      options:
        - feature
        - fix
        - docs
        - refactor
        - test
        - chore
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 対象領域
      description: 主な変更対象を選択する
      multiple: true
      options:
        - web
        - api
        - reco
        - batch
        - database
        - infra
        - docs
        - ci-cd
        - test
        - github
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: 目的
      description: このIssueで何を達成するかを書く
      placeholder: 例）ranking機能のAPI仕様を定義する
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景・理由
      description: なぜこの作業が必要かを書く
      placeholder: 例）レコメンド結果の並び順を安定して返すため、API仕様を明確化する必要がある
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 作業範囲
      description: 対象ファイル・対象ドキュメント・対象機能を書く
      placeholder: |
        - docs/...
        - apps/api/...
        - apps/reco/...
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 参照すべきdocs
      description: 作業前に参照すべき正本docsを列挙する
      placeholder: |
        - docs/00_共通/プロジェクト工程定義.md
        - docs/00_共通/Issue運用ルール.md
        - docs/00_共通/Projects運用ルール.md
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 完了条件
      description: このIssueをDoneにできる条件を書く
      placeholder: |
        - [ ] 対象成果物が作成・更新されている
        - [ ] 関連docsと矛盾していない
        - [ ] 必要な確認が完了している
        - [ ] PRが作成され、Issueと紐づいている
    validations:
      required: true

  - type: textarea
    id: check_points
    attributes:
      label: 確認観点
      description: 実施すべき確認内容を書く
      placeholder: |
        - [ ] Markdown表示崩れがない
        - [ ] 既存成果物と整合している
        - [ ] 不要ファイルが含まれていない
    validations:
      required: false
