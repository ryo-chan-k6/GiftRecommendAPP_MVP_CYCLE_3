name: Base
description: 設計・実装・ドキュメント更新などの通常作業
title: "[Epic/Task]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        ## Base Issue
        通常作業用のIssue。
        進捗・優先度・日付・EstimateはProjectsで管理する。
        Issue本文には、目的・背景・作業範囲・完了条件を記載する。

        > このIssueは、作成後に GitHub Actions（Issue metadata sync and create branch）で本文を読み取り、**Labels・Milestone・親子（Sub-issue）** を同期したうえで、作業ブランチを作成します。

  - type: dropdown
    id: unit
    attributes:
      label: 作業単位
      description: Issueの粒度を選択する。ブランチ命名のunitに利用する。
      options:
        - epic
        - task
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: 親Issue
      description: 紐づくEpicまたは親Issue番号を書く。親がない場合は「なし」と記載する。`#番号` があると Actions が親に Sub-issue として紐づけます。
      placeholder: "#12 / なし"
    validations:
      required: true

  - type: dropdown
    id: project_phase
    attributes:
      label: プロジェクト工程
      description: リポジトリの Milestone タイトルと完全一致する値を選ぶ。該当 Milestone が無い場合は GitHub 上で作成するか「なし」を選ぶ。Issue運用ルールの Milestone 利用方針に従う。
      options:
        - なし
        - 事業構想工程完了
        - ドメイン探索工程完了
        - ドメイン要件定義工程完了
        - ドメインモデル設計工程完了
        - アプリケーション設計工程完了
        - 実装設計工程完了
        - 開発工程完了
        - 結合・総合テスト工程完了
        - リリース工程完了
        - 運用・改善工程完了
    validations:
      required: true

  - type: dropdown
    id: work_type
    attributes:
      label: 作業種別
      description: 作業内容の分類を選択する。Issue Labelの type:* に連携する。
      options:
        - feature
        - fix
        - docs
        - refactor
        - chore
        - test
        - hotfix
        - spike
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 対象領域
      description: 主な変更対象を選択する。Issue Labelの area:* に連携する。
      multiple: true
      options:
        - web
        - api
        - reco
        - batch
        - db
        - docs
        - infra
        - project
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      description: Issue Labelの priority:* に連携する。
      options:
        - high
        - medium
        - low
    validations:
      required: true

  - type: dropdown
    id: owner_mode
    attributes:
      label: 作業主体
      description: AI主導か人主導かを選択する。Issue Labelの ai-agent / human-led に連携する。
      options:
        - ai-agent
        - human-led
    validations:
      required: true

  - type: checkboxes
    id: options
    attributes:
      label: 補助ラベル
      description: 必要に応じて選択する。
      options:
        - label: blocked
          required: false
        - label: "risk: high"
          required: false
        - label: no-branch
          required: false

  - type: textarea
    id: purpose
    attributes:
      label: 目的
      description: このIssueで何を達成するかを書く
      placeholder: 例）ranking機能のAPI仕様を定義する
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景・理由
      description: なぜこの作業が必要かを書く
      placeholder: 例）レコメンド結果の並び順を安定して返すため、API仕様を明確化する必要がある
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 作業範囲
      description: 対象ファイル・対象ドキュメント・対象機能を書く
      placeholder: |
        - docs/...
        - apps/api/...
        - apps/reco/...
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 参照すべきdocs
      description: 作業前に参照すべき正本docsを列挙する
      placeholder: |
        - docs/00_共通/プロジェクト工程定義.md
        - docs/00_共通/Issue運用ルール.md
        - docs/00_共通/Projects運用ルール.md
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 完了条件
      description: このIssueをDoneにできる条件を書く
      placeholder: |
        - [ ] 対象成果物が作成・更新されている
        - [ ] 関連docsと矛盾していない
        - [ ] 必要な確認が完了している
        - [ ] PRが作成され、Issueと紐づいている
    validations:
      required: true

  - type: textarea
    id: check_points
    attributes:
      label: 確認観点
      description: 実施すべき確認内容を書く
      placeholder: |
        - [ ] Markdown表示崩れがない
        - [ ] 既存成果物と整合している
        - [ ] 不要ファイルが含まれていない
    validations:
      required: false
