name: Epic
description: 機能単位・大きな作業単位を管理する親Issue
title: "[Epic]: "
labels:
  - epic
body:
  - type: markdown
    attributes:
      value: |
        ## Epic Issue
        機能単位・大きな作業単位を管理する親Issue。
        子Issueを紐づけて、タスク分解・進捗把握に利用する。

  - type: textarea
    id: purpose
    attributes:
      label: 目的
      description: このEpicで達成したいことを書く
      placeholder: 例）レコメンドランキング機能を設計・実装可能な状態にする
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景・理由
      description: なぜこのEpicが必要かを書く
      placeholder: 例）MVPで推薦結果の並び順を制御する必要があるため
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 対象範囲
      description: このEpicに含める範囲を書く
      placeholder: |
        - ranking機能設計
        - ranking API仕様
        - rankingロジック実装
        - rankingテスト
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: 対象外
      description: このEpicでは扱わない範囲を書く
      placeholder: |
        - 本番最適化
        - 高度なABテスト
    validations:
      required: false

  - type: textarea
    id: child_issues
    attributes:
      label: 子Issue
      description: 作成後に子Issueをリンクする
      placeholder: |
        - [ ] #xx ranking機能設計
        - [ ] #xx ranking機能開発
        - [ ] #xx ranking機能テスト
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 完了条件
      description: このEpicをCloseできる条件を書く
      placeholder: |
        - [ ] 子IssueがすべてDoneになっている
        - [ ] 成果物・実装・テストが完了している
        - [ ] Projects上のStatusがDoneになっている
    validations:
      required: true
