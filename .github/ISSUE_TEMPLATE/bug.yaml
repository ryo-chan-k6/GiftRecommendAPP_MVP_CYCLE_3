name: 不具合修正
description: バグ・不具合・想定外挙動の修正
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 不具合修正Issue
        再現条件・期待値・実際の挙動・影響範囲を明確にする。
        Projectsで優先度・対象領域・対応状況を管理する。

  - type: dropdown
    id: severity
    attributes:
      label: 重要度
      description: 不具合の重要度を選択する
      options:
        - Critical
        - Major
        - Minor
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      description: ProjectsのPriority管理に利用する
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: target_area
    attributes:
      label: 対象領域
      description: 不具合の主な影響範囲を選択する
      multiple: true
      options:
        - web
        - api
        - reco
        - batch
        - database
        - observability
        - ci-cd
        - docs
        - infra
        - packages
    validations:
      required: true

  - type: dropdown
    id: estimate
    attributes:
      label: 工数目安
      description: ProjectsのEstimate管理に利用する
      options:
        - XS（〜1h）
        - S（半日）
        - M（1日）
        - L（2〜3日）
        - XL（それ以上）
    validations:
      required: false

  - type: input
    id: sprint
    attributes:
      label: Sprint（任意）
      description: ProjectsのSprint管理に利用する
      placeholder: Sprint-1

  - type: dropdown
    id: initial_status
    attributes:
      label: 初期ステータス
      description: Projects上の初期状態
      options:
        - Backlog
        - Ready
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: 現在の挙動
      description: 実際に起きていること
      placeholder: 例）レコメンドAPI実行時に500エラーが返る
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 期待する挙動
      description: 本来どうなるべきか
      placeholder: 例）正常な入力条件ではレコメンド結果が200で返却される
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      description: 再現できる手順を書く
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: 影響範囲
      description: どの機能・データ・ユーザー体験に影響するか
      placeholder: |
        - 影響機能:
        - 影響ユーザー:
        - 影響データ:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: ログ・エラー情報
      description: エラー内容、runId、スクリーンショット、ログなど
      placeholder: |
        - runId:
        - error:
        - log:
    validations:
      required: false

  - type: textarea
    id: cause_hypothesis
    attributes:
      label: 原因仮説
      description: 分かっている範囲で原因候補を書く
      placeholder: 例）Reco側のscore計算でnull値を考慮できていない可能性
    validations:
      required: false

  - type: textarea
    id: fix_policy
    attributes:
      label: 修正方針
      description: どのように修正する予定か
      placeholder: |
        - 原因調査
        - 修正対象
        - テスト追加方針
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 参照すべきdocs
      description: 修正前に参照すべき正本docsを列挙する
      placeholder: |
        - docs/p4_5_横断設計/ログ設計書.md
        - docs/p4_5_横断設計/Observability方針書.md
        - docs/p5_実装設計/API仕様書.md
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 完了条件
      placeholder: |
        - [ ] 不具合が再現しない
        - [ ] 関連テストが追加・更新されている
        - [ ] 必要なdocsが更新されている
        - [ ] runId / log / metric で追跡可能である
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: チェック
      options:
        - label: 重要度を設定した
          required: true
        - label: 影響範囲を記載した
          required: true
        - label: Observability情報があれば記載した
          required: false
        - label: 修正後に再発防止観点を確認する
          required: false
