name: Update Project Status by Planned Start

on:
  schedule:
    # 毎日 00:05 JST に実行
    - cron: "5 15 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-project-status:
    runs-on: ubuntu-latest

    steps:
      - name: Update Backlog issues to Todo by Planned Start
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            const PROJECT_OWNER = "ryo-chan-k6";
            const PROJECT_NUMBER = 1; // ← 自分のProjects番号に変更
            const REPOSITORY_NAME_WITH_OWNER = "ryo-chan-k6/GiftRecommendAPP_MVP_CYCLE_3";

            const STATUS_FIELD_NAME = "Status";
            const PLANNED_START_FIELD_NAME = "Planned Start";
            const FROM_STATUS = "Backlog";
            const TO_STATUS = "Todo";

            const today = new Date().toLocaleDateString("sv-SE", {
              timeZone: "Asia/Tokyo",
            });

            console.log(`Today: ${today}`);

            const projectQuery = `
              query($owner: String!, $number: Int!, $after: String) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 100) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                    items(first: 100, after: $after) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                            title
                            state
                            repository {
                              nameWithOwner
                            }
                          }
                        }
                        fieldValues(first: 100) {
                          nodes {
                            ... on ProjectV2ItemFieldDateValue {
                              date
                              field {
                                ... on ProjectV2FieldCommon {
                                  id
                                  name
                                }
                              }
                            }
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              optionId
                              field {
                                ... on ProjectV2FieldCommon {
                                  id
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                    }
                  }
                }
              }
            `;

            const updateMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: {
                      singleSelectOptionId: $optionId
                    }
                  }
                ) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            let after = null;
            let updatedCount = 0;

            while (true) {
              const result = await github.graphql(projectQuery, {
                owner: PROJECT_OWNER,
                number: PROJECT_NUMBER,
                after,
              });

              const project = result.user.projectV2;
              const projectId = project.id;

              const statusField = project.fields.nodes.find(
                f => f.name === STATUS_FIELD_NAME
              );

              if (!statusField) {
                throw new Error(`Status field not found: ${STATUS_FIELD_NAME}`);
              }

              const todoOption = statusField.options.find(
                o => o.name === TO_STATUS
              );

              if (!todoOption) {
                throw new Error(`Status option not found: ${TO_STATUS}`);
              }

              for (const item of project.items.nodes) {
                const issue = item.content;

                if (!issue) continue;
                if (issue.state !== "OPEN") continue;
                if (issue.repository.nameWithOwner !== REPOSITORY_NAME_WITH_OWNER) continue;

                const plannedStartValue = item.fieldValues.nodes.find(
                  v => v.field?.name === PLANNED_START_FIELD_NAME
                );

                const statusValue = item.fieldValues.nodes.find(
                  v => v.field?.name === STATUS_FIELD_NAME
                );

                const plannedStart = plannedStartValue?.date;
                const currentStatus = statusValue?.name;

                if (!plannedStart) continue;

                const shouldMoveToTodo =
                  currentStatus === FROM_STATUS &&
                  plannedStart <= today;

                if (!shouldMoveToTodo) continue;

                console.log(
                  `Update Issue #${issue.number}: ${issue.title} | ${currentStatus} -> ${TO_STATUS} | Planned Start: ${plannedStart}`
                );

                await github.graphql(updateMutation, {
                  projectId,
                  itemId: item.id,
                  fieldId: statusField.id,
                  optionId: todoOption.id,
                });

                updatedCount++;
              }

              if (!project.items.pageInfo.hasNextPage) break;
              after = project.items.pageInfo.endCursor;
            }

            console.log(`Updated items: ${updatedCount}`);
