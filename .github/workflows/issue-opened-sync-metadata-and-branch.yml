# -----------------------------------------------------------------------------
# Issue フォーム本文からラベル・Milestone・親子（Sub-issue）を同期し、続けて作業ブランチを作成・リネームする
#
# 正本: docs/00_共通/プロジェクト運用ルール/GitHub Actions仕様書/Issue同期とブランチ作成ワークフロー.md
# Step1: メタデータ同期（issues.opened または workflow_dispatch + sync_metadata）
# Step2: GraphQL createLinkedBranch / 方針A リネーム（従来どおり）
# -----------------------------------------------------------------------------

name: Issue metadata sync and create branch

on:
  issues:
    types:
      - opened
      - labeled
      - unlabeled
      - edited
  workflow_dispatch:
    inputs:
      issue_number:
        description: 対象 Issue 番号
        required: true
      dry_run:
        description: true ならブランチ操作・Issue コメントを行わない（ログのみ）
        required: false
        default: "false"
      sync_metadata:
        description: true なら Step1 で本文からラベル等を同期する（手動再実行時。既定は false）
        required: false
        default: "false"

# contents: GraphQL createLinkedBranch / Git ref
# issues:   Issue コメント
# pull-requests: オープン PR の head 判定
permissions:
  contents: write
  issues: write
  pull-requests: read

# 同一 Issue のイベントを直列化（進行中ジョブは打ち切らない）
concurrency:
  group: issue-sync-branch-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  create-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Sync issue metadata from Task form body
        if: ${{ (github.event_name == 'issues' && github.event.action == 'opened') || (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_metadata == 'true') }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const dryRun =
              context.eventName === "workflow_dispatch" &&
              String(context.payload.inputs?.dry_run || "") === "true";

            let issueNumber;
            let bodyText = "";
            if (context.eventName === "workflow_dispatch") {
              issueNumber = parseInt(String(context.payload.inputs.issue_number), 10);
              if (!Number.isFinite(issueNumber) || issueNumber < 1) {
                core.setFailed("Invalid issue_number");
                return;
              }
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: issueNumber,
              });
              bodyText = issue.body || "";
            } else {
              issueNumber = context.payload.issue?.number;
              bodyText = context.payload.issue?.body || "";
            }

            if (!bodyText.includes("### 作業単位")) {
              core.info("Task issue form marker not found; skipping metadata sync.");
              return;
            }

            const AREA_KEYS = new Set(["web", "api", "reco", "batch", "db", "docs", "infra", "project"]);

            function parseFormSections(body) {
              const sections = {};
              const lines = (body || "").split(/\r?\n/);
              let key = null;
              const buf = [];
              function flush() {
                if (key !== null) sections[key] = buf.join("\n").trim();
                buf.length = 0;
              }
              for (const raw of lines) {
                const m = /^### (.+)$/.exec(raw);
                if (m) {
                  flush();
                  key = m[1].trim();
                } else {
                  buf.push(raw);
                }
              }
              flush();
              return sections;
            }

            function firstLine(s) {
              const t = (s || "").trim();
              const i = t.indexOf("\n");
              return i === -1 ? t : t.slice(0, i).trim();
            }

            function parseAreas(raw) {
              const t = (raw || "").trim();
              if (!t) return [];
              const parts = t.split(/[\n,，、]+/).map((x) => x.trim().toLowerCase()).filter(Boolean);
              const out = [];
              for (const p of parts) {
                if (AREA_KEYS.has(p)) out.push(p);
              }
              return [...new Set(out)];
            }

            function parseCheckedCheckboxLabels(text) {
              const out = [];
              for (const line of (text || "").split(/\r?\n/)) {
                const m = /^\s*-\s*\[x\]\s*(.+)$/i.exec(line);
                if (m) out.push(m[1].trim());
              }
              return out;
            }

            function isManagedLabel(name) {
              if (!name) return false;
              if (/^(unit|type|area|priority):/.test(name)) return true;
              return ["ai-agent", "human-led", "blocked", "risk: high", "no-branch"].includes(name);
            }

            function buildDesiredLabels(sections) {
              const labels = [];

              const unit = firstLine(sections["作業単位"]).toLowerCase();
              if (unit === "epic") labels.push("unit: epic");
              else if (unit === "task") labels.push("unit: task");

              const wt = firstLine(sections["作業種別"]).toLowerCase();
              const typeMap = new Set(["feature", "fix", "docs", "refactor", "chore", "test", "hotfix", "spike"]);
              if (typeMap.has(wt)) labels.push(`type: ${wt}`);

              for (const a of parseAreas(sections["対象領域"])) {
                labels.push(`area: ${a}`);
              }

              const pr = firstLine(sections["優先度"]).toLowerCase();
              if (pr === "high" || pr === "medium" || pr === "low") {
                labels.push(`priority: ${pr}`);
              }

              const ownerMode = firstLine(sections["作業主体"]).toLowerCase();
              if (ownerMode === "ai-agent" || ownerMode === "human-led") {
                labels.push(ownerMode);
              }

              const checked = parseCheckedCheckboxLabels(sections["補助ラベル"]);
              const optMap = {
                blocked: "blocked",
                "risk: high": "risk: high",
                "no-branch": "no-branch",
              };
              for (const c of checked) {
                if (optMap[c]) labels.push(optMap[c]);
              }

              return labels;
            }

            async function postComment(body) {
              if (dryRun) {
                core.info(`[dry_run] Would comment:\n${body}`);
                return;
              }
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }

            /** Octokit / fetch 由来のエラーから status とレスポンス本文（先頭のみ）を整形 */
            function formatApiError(e) {
              const status = e?.status ?? e?.response?.status;
              const lines = [`status: ${status != null ? status : "unknown"}`];
              lines.push(`message: ${String(e?.message || e)}`);
              const data = e?.response?.data;
              if (data !== undefined && data !== null) {
                let s = typeof data === "string" ? data : JSON.stringify(data);
                if (s.length > 1200) s = `${s.slice(0, 1200)}...(truncated)`;
                lines.push(`response_body: ${s}`);
              }
              return lines.join("\n");
            }

            const sections = parseFormSections(bodyText);
            const desired = buildDesiredLabels(sections);

            if (desired.filter((l) => l.startsWith("unit:")).length !== 1) {
              core.warning("Form unit invalid or missing; skipping label/milestone/parent sync.");
              return;
            }
            if (desired.filter((l) => l.startsWith("type:")).length !== 1) {
              core.warning("Form work_type invalid or missing; skipping label/milestone/parent sync.");
              return;
            }

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber,
            });
            if (issue.state !== "open") {
              core.info("Issue not open; skipping metadata sync.");
              return;
            }

            const current = (issue.labels || [])
              .map((l) => (typeof l === "string" ? l : l.name))
              .filter(Boolean);
            const kept = current.filter((n) => !isManagedLabel(n));
            const merged = [...new Set([...kept, ...desired])];

            if (!dryRun) {
              await github.rest.issues.setLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: merged,
              });
            } else {
              core.info(`[dry_run] setLabels: ${JSON.stringify(merged)}`);
            }

            if ("プロジェクト工程" in sections) {
              const msRaw = firstLine(sections["プロジェクト工程"]);
              if (msRaw === "なし") {
                if (!dryRun) {
                  await github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    milestone: null,
                  });
                } else {
                  core.info("[dry_run] Would clear milestone");
                }
              } else if (msRaw) {
                const { data: milestones } = await github.rest.issues.listMilestones({
                  owner,
                  repo,
                  state: "open",
                  per_page: 100,
                });
                const hit = milestones.find((m) => m.title === msRaw);
                if (hit) {
                  if (!dryRun) {
                    await github.rest.issues.update({
                      owner,
                      repo,
                      issue_number: issueNumber,
                      milestone: hit.number,
                    });
                  } else {
                    core.info(`[dry_run] Would set milestone #${hit.number} ${hit.title}`);
                  }
                } else {
                  await postComment(
                    `⚠️ Milestone「${msRaw}」がオープンな Milestone に見つかりません。GitHub の Milestones を作成するか、Issue テンプレートの選択肢をリポジトリと揃えてください。`,
                  );
                }
              }
            }

            const parentRaw = (sections["親Issue"] || "").trim();
            const pm = parentRaw.match(/#(\d+)/);
            if (pm) {
              const pnum = parseInt(pm[1], 10);
              if (pnum === issueNumber) {
                await postComment("⚠️ 親Issue に自分自身の番号が指定されているため、親子の紐づけはスキップしました。");
              } else {
                try {
                  const { data: parent } = await github.rest.issues.get({
                    owner,
                    repo,
                    issue_number: pnum,
                  });
                  if (parent.state !== "open") {
                    await postComment(`⚠️ 親Issue #${pnum} が Open ではないため、Sub-issue の紐づけをスキップしました。`);
                  } else if (!dryRun) {
                    // REST の sub_issue_id は Issue の number ではなく id（数値 ID）を渡す（公式: "The id of the sub-issue"）。
                    await github.request("POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues", {
                      owner,
                      repo,
                      issue_number: pnum,
                      sub_issue_id: issue.id,
                    });
                  } else {
                    core.info(
                      `[dry_run] Would POST sub_issue parent=#${pnum} child=#${issueNumber} sub_issue_id=${issue.id}`,
                    );
                  }
                } catch (e) {
                  const detail = formatApiError(e);
                  core.error(`Sub-issue link failed: ${detail}`);
                  await postComment(
                    [
                      `⚠️ 親子（Sub-issue）の紐づけに失敗しました（親 #${pnum}、子 #${issueNumber}、sub_issue_id=${issue.id}）。手動で Relationships を設定してください。`,
                      "",
                      "```",
                      detail,
                      "```",
                    ].join("\n"),
                  );
                }
              }
            }

            core.info(`Metadata sync done for #${issueNumber} (${merged.length} labels).`);

      # Step 2: 実装言語 Node（actions/github-script）。Step1 後は issues.get で最新ラベルを参照する。
      - name: Create or sync work branch
        uses: actions/github-script@v8
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Step 2: ラベル同期後の Issue を issues.get で取得し、linked branch を作成・リネームする。
            // =============================================================================
            // 定数・マッピング（仕様書のラベル名・ベースブランチと一致させる）
            // =============================================================================
            const BASE_BRANCH = "develop";
            const NO_BRANCH_LABEL = "no-branch";

            const TYPE_MAP = {
              "type: feature": "feature",
              "type: fix": "fix",
              "type: docs": "docs",
              "type: refactor": "refactor",
              "type: chore": "chore",
              "type: test": "test",
              "type: hotfix": "hotfix",
              "type: spike": "spike",
            };

            const UNIT_MAP = {
              "unit: epic": "epic",
              "unit: task": "task",
            };

            /** GraphQL 例外からメッセージを取り出す */
            function graphqlFirstErrorMessage(err) {
              if (Array.isArray(err?.errors) && err.errors[0]?.message) return err.errors[0].message;
              if (Array.isArray(err?.response?.errors) && err.response.errors[0]?.message) {
                return err.response.errors[0].message;
              }
              return String(err?.message || err);
            }

            // --- Issue タイトル → summary（OpenAI + sanitize） ---
            function sanitizeSlug(raw) {
              if (!raw || typeof raw !== "string") return "";
              let s = raw.trim().replace(/^["']|["']$/g, "");
              s = s.toLowerCase();
              s = s.replace(/\s+/g, "-");
              s = s.replace(/[^a-z0-9-]/g, "");
              s = s.replace(/-+/g, "-");
              s = s.replace(/^-+|-+$/g, "");
              if (s.length > 48) s = s.slice(0, 48).replace(/-+$/g, "");
              return s;
            }

            async function summarizeTitle(title, issueNum, apiKey) {
              const fallback = `issue-${issueNum}`;
              if (!apiKey) return fallback;
              try {
                const controller = new AbortController();
                const t = setTimeout(() => controller.abort(), 25_000);
                const res = await fetch("https://api.openai.com/v1/chat/completions", {
                  method: "POST",
                  headers: {
                    Authorization: `Bearer ${apiKey}`,
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [
                      {
                        role: "system",
                        content:
                          "Reply with ONLY a short English kebab-case slug (a-z and hyphens) summarizing the GitHub issue title. No quotes, no punctuation, no explanation. Max 40 characters.",
                      },
                      { role: "user", content: title },
                    ],
                    temperature: 0.2,
                    max_tokens: 60,
                  }),
                  signal: controller.signal,
                });
                clearTimeout(t);
                if (!res.ok) return fallback;
                const data = await res.json();
                const text = data.choices?.[0]?.message?.content;
                if (!text || typeof text !== "string") return fallback;
                const slug = sanitizeSlug(text);
                return slug || fallback;
              } catch {
                return fallback;
              }
            }

            // --- REST: リポジトリの全ブランチをページングし、Issue 番号パターンに一致するものだけ返す ---
            async function listBranchesMatchingIssue(github, owner, repo, issueNum) {
              const re = new RegExp(`^.+/(epic|task)-${issueNum}-`);
              const names = [];
              let page = 1;
              for (;;) {
                const { data } = await github.rest.repos.listBranches({
                  owner,
                  repo,
                  per_page: 100,
                  page,
                });
                for (const b of data) {
                  if (re.test(b.name)) names.push(b.name);
                }
                if (data.length < 100) break;
                page += 1;
              }
              return names;
            }

            async function hasOpenPrForHead(github, owner, repo, branchName) {
              const head = `${owner}:${branchName}`;
              const { data } = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head,
                per_page: 5,
              });
              return data.length > 0;
            }

            function normalizeRefShortName(refName) {
              if (!refName) return "";
              return String(refName).replace(/^refs\/heads\//, "");
            }

            /** Issue の Node ID・repo Node ID・linkedBranches を取得 */
            async function fetchIssueGraphqlContext(github, owner, repo, issueNumber) {
              const data = await github.graphql(
                `query($owner: String!, $repo: String!, $issue: Int!) {
                  repository(owner: $owner, name: $repo) {
                    id
                    issue(number: $issue) {
                      id
                      linkedBranches(first: 20) {
                        nodes {
                          id
                          ref { name }
                        }
                      }
                    }
                  }
                }`,
                { owner, repo, issue: issueNumber },
              );
              const repoNode = data.repository;
              if (!repoNode?.issue || !repoNode.issue.id) {
                throw new Error("graphql_issue_not_found");
              }
              return {
                repositoryId: repoNode.id,
                issueId: repoNode.issue.id,
                linkedBranches: repoNode.issue.linkedBranches?.nodes || [],
              };
            }

            function findLinkedBranchId(linkedBranchNodes, shortBranchName) {
              for (const node of linkedBranchNodes) {
                if (normalizeRefShortName(node.ref?.name) === shortBranchName) return node.id;
              }
              return null;
            }

            async function gqlCreateLinkedBranch(github, issueId, repositoryId, oid, name) {
              await github.graphql(
                `mutation($input: CreateLinkedBranchInput!) {
                  createLinkedBranch(input: $input) {
                    linkedBranch { id }
                  }
                }`,
                { input: { issueId, repositoryId, oid, name } },
              );
            }

            async function gqlDeleteLinkedBranch(github, linkedBranchId) {
              await github.graphql(
                `mutation($input: DeleteLinkedBranchInput!) {
                  deleteLinkedBranch(input: $input) {
                    clientMutationId
                  }
                }`,
                { input: { linkedBranchId } },
              );
            }

            async function cleanupNewBranchAfterFailedRename(github, owner, repo, refNew, createdLinkedId) {
              if (createdLinkedId) {
                try {
                  await gqlDeleteLinkedBranch(github, createdLinkedId);
                } catch (_) {}
              }
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: refNew });
              } catch (_) {}
            }

            /**
             * 方針A: deleteLinkedBranch(任意) → createLinkedBranch → 旧 ref 削除
             */
            async function renameBranchWithLinkedIssue(
              github,
              owner,
              repo,
              issueId,
              repositoryId,
              linkedBranchNodes,
              existingBranch,
              expectedBranch,
            ) {
              const refOld = `heads/${existingBranch}`;
              const refNew = `heads/${expectedBranch}`;

              const { data: oldRef } = await github.rest.git.getRef({ owner, repo, ref: refOld });
              const initialSha = oldRef.object.sha;

              const oldLinkedId = findLinkedBranchId(linkedBranchNodes, existingBranch);
              if (oldLinkedId) {
                await gqlDeleteLinkedBranch(github, oldLinkedId);
              }

              let createdLinkedId = null;
              try {
                const createData = await github.graphql(
                  `mutation($input: CreateLinkedBranchInput!) {
                    createLinkedBranch(input: $input) {
                      linkedBranch { id }
                    }
                  }`,
                  {
                    input: {
                      issueId,
                      repositoryId,
                      oid: initialSha,
                      name: expectedBranch,
                    },
                  },
                );
                createdLinkedId = createData?.createLinkedBranch?.linkedBranch?.id || null;
              } catch (e) {
                const msg = graphqlFirstErrorMessage(e);
                if (msg.includes("already exists") || msg.includes("Could not create")) {
                  try {
                    const { data: ex } = await github.rest.git.getRef({ owner, repo, ref: refNew });
                    if (ex.object.sha === initialSha) {
                      const { data: oldCheck } = await github.rest.git.getRef({ owner, repo, ref: refOld });
                      if (oldCheck.object.sha === initialSha) {
                        await github.rest.git.deleteRef({ owner, repo, ref: refOld });
                      }
                      return { kind: "idempotent" };
                    }
                  } catch (_) {
                    /* fall through */
                  }
                }
                throw e;
              }

              const { data: created } = await github.rest.git.getRef({ owner, repo, ref: refNew });
              if (created.object.sha !== initialSha) {
                await cleanupNewBranchAfterFailedRename(github, owner, repo, refNew, createdLinkedId);
                throw new Error("new_ref_verification_failed");
              }

              const { data: oldAgain } = await github.rest.git.getRef({ owner, repo, ref: refOld });
              if (oldAgain.object.sha !== initialSha) {
                await cleanupNewBranchAfterFailedRename(github, owner, repo, refNew, createdLinkedId);
                throw new Error("old_branch_moved_abort");
              }

              await github.rest.git.deleteRef({ owner, repo, ref: refOld });
              return { kind: "renamed" };
            }

            // --- Issue コメント用トリガー表記 ---
            function triggerLabel() {
              if (context.eventName === "workflow_dispatch") {
                const dr = context.payload.inputs?.dry_run === "true" ? " (dry_run)" : "";
                return `workflow_dispatch${dr}`;
              }
              return `issues.${context.payload.action}`;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const dryRun =
              context.eventName === "workflow_dispatch" &&
              String(context.payload.inputs?.dry_run || "") === "true";

            let issueNumber;
            if (context.eventName === "workflow_dispatch") {
              issueNumber = parseInt(String(context.payload.inputs.issue_number), 10);
              if (!Number.isFinite(issueNumber) || issueNumber < 1) {
                core.setFailed("Invalid issue_number");
                return;
              }
            } else {
              issueNumber = context.payload.issue?.number;
              if (!issueNumber) {
                core.setFailed("Missing issue number in payload");
                return;
              }
            }

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber,
            });

            if (issue.state !== "open") {
              core.info(`Issue #${issueNumber} is not open; skipping.`);
              return;
            }

            const labelNames = (issue.labels || [])
              .map((l) => (typeof l === "string" ? l : l.name))
              .filter(Boolean);

            if (labelNames.includes(NO_BRANCH_LABEL)) {
              core.info(`Issue #${issueNumber} has ${NO_BRANCH_LABEL}; skipping.`);
              return;
            }

            const units = labelNames.filter((n) => n.startsWith("unit:"));
            const types = labelNames.filter((n) => n.startsWith("type:"));

            async function postComment(body) {
              if (dryRun) {
                core.info(`[dry_run] Would comment on #${issueNumber}:\n${body}`);
                return;
              }
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }

            function errorComment(reasonLines) {
              return (
                "ブランチを自動作成できませんでした。\n\n理由：\n" +
                reasonLines.map((l) => `- ${l}`).join("\n") +
                "\n\n対応：\n" +
                "- ラベル（`unit:*` と `type:*` をそれぞれ1つ、`no-branch` で除外）を確認してください。"
              );
            }

            if (units.length !== 1) {
              let reason;
              if (units.length === 0) reason = "`unit:*` ラベルが設定されていません。";
              else reason = "`unit:*` ラベルが複数付与されています。";
              await postComment(errorComment([reason]));
              return;
            }

            if (types.length !== 1) {
              let reason;
              if (types.length === 0) reason = "`type:*` ラベルが設定されていません。";
              else reason = "`type:*` ラベルが複数付与されています。";
              await postComment(errorComment([reason]));
              return;
            }

            const unitLabel = units[0];
            const typeLabel = types[0];
            const unit = UNIT_MAP[unitLabel];
            const branchType = TYPE_MAP[typeLabel];

            if (!unit) {
              await postComment(
                errorComment([
                  `\`unit:*\` が許可された値ではありません（\`${unitLabel}\`）。\`unit: epic\` または \`unit: task\` を付与してください。`,
                ]),
              );
              return;
            }

            if (!branchType) {
              await postComment(
                errorComment([
                  `\`type:*\` が許可された値ではありません（\`${typeLabel}\`）。仕様の type ラベルを1つ付与してください。`,
                ]),
              );
              return;
            }

            const apiKey = process.env.OPENAI_API_KEY || "";
            let summary = await summarizeTitle(issue.title || "", issueNumber, apiKey);
            summary = sanitizeSlug(summary) || `issue-${issueNumber}`;

            const expectedBranch = `${branchType}/${unit}-${issueNumber}-${summary}`;

            let baseSha;
            try {
              const { data: base } = await github.rest.repos.getBranch({
                owner,
                repo,
                branch: BASE_BRANCH,
              });
              baseSha = base.commit.sha;
            } catch (e) {
              if (e.status === 404) {
                core.setFailed(`Base branch '${BASE_BRANCH}' not found`);
                return;
              }
              throw e;
            }

            const matching = await listBranchesMatchingIssue(github, owner, repo, issueNumber);

            if (matching.length >= 2) {
              await postComment(
                [
                  "対応するbranchが複数存在します。",
                  "",
                  "検出されたbranch：",
                  ...matching.map((b) => `- \`${b}\``),
                  "",
                  "対応：不要なbranchを削除し、1つに統一してください。",
                ].join("\n"),
              );
              return;
            }

            const trig = triggerLabel();

            // GraphQL: Issue / Repository の Node ID（createLinkedBranch 必須）
            let gqlCtx;
            try {
              gqlCtx = await fetchIssueGraphqlContext(github, owner, repo, issueNumber);
            } catch (e) {
              if (String(e.message) === "graphql_issue_not_found") {
                await postComment(errorComment(["GraphQL で Issue を解決できませんでした。"]));
                return;
              }
              throw e;
            }
            const { issueId, repositoryId, linkedBranches } = gqlCtx;

            // --- 該当ブランチ 0 件: createLinkedBranch のみ（REST createRef は使わない） ---
            if (matching.length === 0) {
              if (dryRun) {
                core.info(
                  `[dry_run] Would createLinkedBranch #${issueNumber} name=${expectedBranch} oid=${baseSha}`,
                );
                return;
              }
              try {
                await gqlCreateLinkedBranch(github, issueId, repositoryId, baseSha, expectedBranch);
              } catch (e) {
                const msg = graphqlFirstErrorMessage(e);
                if (
                  msg.includes("already exists") ||
                  msg.includes("Could not create") ||
                  e.status === 422
                ) {
                  try {
                    const { data: existing } = await github.rest.git.getRef({
                      owner,
                      repo,
                      ref: `heads/${expectedBranch}`,
                    });
                    if (existing.object.sha === baseSha) {
                      await postComment(
                        [
                          "対応ブランチは既に存在します。",
                          "",
                          `- Branch: \`${expectedBranch}\``,
                        ].join("\n"),
                      );
                      return;
                    }
                  } catch (_) {
                    /* fall through */
                  }
                }
                core.error("createLinkedBranch failed");
                throw e;
              }

              await postComment(
                [
                  "ブランチを自動作成しました（Issue の Development にリンク済みです）。",
                  "",
                  `- Branch: \`${expectedBranch}\``,
                  `- Base: \`${BASE_BRANCH}\``,
                  `- Trigger: \`${trig}\``,
                ].join("\n"),
              );
              return;
            }

            const existingBranch = matching[0];

            // --- 1 件・名前一致: 冪等 ---
            if (existingBranch === expectedBranch) {
              await postComment(
                [
                  "対応ブランチは既に存在します。",
                  "",
                  `- Branch: \`${expectedBranch}\``,
                ].join("\n"),
              );
              return;
            }

            // --- 1 件・名前不一致: PR があるとリネームしない ---
            const prOpen = await hasOpenPrForHead(github, owner, repo, existingBranch);
            if (prOpen) {
              await postComment(
                [
                  "ブランチ名を自動更新できません（オープンな PR が既存ブランチに紐づいています）。",
                  "",
                  `- 既存 Branch: \`${existingBranch}\``,
                  `- 期待する Branch: \`${expectedBranch}\``,
                  "",
                  "PR を閉じるかブランチを手動で調整したうえで、再実行してください。",
                ].join("\n"),
              );
              return;
            }

            if (dryRun) {
              core.info(
                `[dry_run] Would rename (linked) ${existingBranch} -> ${expectedBranch} (方針A)`,
              );
              return;
            }

            // --- 方針A リネーム ---
            try {
              const result = await renameBranchWithLinkedIssue(
                github,
                owner,
                repo,
                issueId,
                repositoryId,
                linkedBranches,
                existingBranch,
                expectedBranch,
              );
              if (result.kind === "idempotent") {
                await postComment(
                  [
                    "対応ブランチは既に存在します。",
                    "",
                    `- Branch: \`${expectedBranch}\``,
                  ].join("\n"),
                );
                return;
              }
            } catch (e) {
              if (e.message === "old_branch_moved_abort") {
                await postComment(
                  [
                    "ブランチ名の自動変更を中断しました（処理中に既存ブランチが更新されました）。",
                    "",
                    "既存ブランチはそのままです。内容を確認のうえ、手動で対応してください。",
                  ].join("\n"),
                );
                return;
              }
              const msg = graphqlFirstErrorMessage(e);
              if (msg.includes("already exists") || msg.includes("Could not create")) {
                await postComment(
                  [
                    "ブランチ名を自動変更できませんでした（同名のブランチが既に存在します）。",
                    "",
                    `- 期待する Branch: \`${expectedBranch}\``,
                  ].join("\n"),
                );
                return;
              }
              throw e;
            }

            await postComment(
              [
                "ブランチ名を更新しました（ラベル／タイトルに合わせて再生成。Issue の Development 向けリンクを更新）。",
                "",
                `- Branch: \`${expectedBranch}\``,
                `- Base: \`${BASE_BRANCH}\`（起点コミットは従来ブランチと同一）`,
                `- Trigger: \`${trig}\``,
              ].join("\n"),
            );
